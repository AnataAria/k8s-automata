[bastion]

[load_balancers]
lb-1 ansible_host=10.0.10.20 ip=10.0.10.20 ansible_user=root

[etcd]
etcd-1 ansible_host=10.0.20.11 ip=10.0.20.11 ansible_user=ubuntu
etcd-2 ansible_host=10.0.20.12 ip=10.0.20.12 ansible_user=ubuntu
etcd-3 ansible_host=10.0.20.13 ip=10.0.20.13 ansible_user=ubuntu

[control_plane]
cp-1 ansible_host=10.0.30.11 ip=10.0.30.11 ansible_user=ubuntu
cp-2 ansible_host=10.0.30.12 ip=10.0.30.12 ansible_user=ubuntu
cp-3 ansible_host=10.0.30.13 ip=10.0.30.13 ansible_user=ubuntu

[workers]
worker-1 ansible_host=10.0.40.21 ip=10.0.40.21 ansible_user=ubuntu
worker-2 ansible_host=10.0.40.22 ip=10.0.40.22 ansible_user=ubuntu

[k8s_cluster:children]
control_plane
workers

[cluster_nodes:children]
etcd
k8s_cluster

[services:children]
load_balancers
bastion

[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=/home/ubuntu/.ssh/id_ed25519
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
k8s_version=1.34.2
cluster_name=example-cluster
service_cidr=10.96.0.0/12
pod_network_cidr=10.244.0.0/16
external_etcd_enabled=true
loadbalancer_enabled=true
