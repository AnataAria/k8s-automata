---
- name: Install Kubernetes prerequisite packages
  ansible.builtin.apt:
    name: "{{ k8s_prerequisite_packages }}"
    state: present
    update_cache: true

- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Kubernetes repository signing key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_minor }}/deb/Release.key"
    dest: /tmp/kubernetes-release.key
    mode: '0644'

- name: Convert Kubernetes repository key to gpg keyring
  ansible.builtin.command: >-
    gpg --dearmor --yes --output {{ k8s_apt_keyring_path }} /tmp/kubernetes-release.key
  args:
    creates: "{{ k8s_apt_keyring_path }}"

- name: Configure Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "{{ k8s_apt_repo }}"
    filename: kubernetes
    state: present
    update_cache: true

- name: Install Kubernetes packages
  ansible.builtin.apt:
    name: "{{ k8s_packages | map('regex_replace', '$', '=' + k8s_version + '-1.1') | list }}"
    state: present
    allow_downgrade: true
    allow_change_held_packages: true
    update_cache: false

- name: Hold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ k8s_packages }}"

- name: Configure kubelet node IP
  ansible.builtin.copy:
    dest: /etc/default/kubelet
    mode: '0644'
    content: |
      KUBELET_EXTRA_ARGS=--node-ip={{ k8s_node_ip }}
  notify: Restart kubelet

- name: Ensure Kubernetes directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /etc/kubernetes
    - /etc/kubernetes/manifests
    - /var/lib/kubelet

- name: Enable kubelet service
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
    state: started
    daemon_reload: true
