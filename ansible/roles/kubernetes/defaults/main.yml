---

kubernetes_configure_firewall: true

kubernetes_cluster_name: "{{ cluster_name | default('k8s-cluster') }}"
kubernetes_service_subnet: "{{ service_subnet | default('10.96.0.0/12') }}"
kubernetes_pod_subnet: "{{ pod_subnet | default('10.244.0.0/16') }}"

kubernetes_control_plane_endpoint: "{{ hostvars[groups['loadbalancers'][0]]['ansible_host'] }}:6443"

kubernetes_kubelet_config:
  container_runtime_endpoint: "unix:///run/containerd/containerd.sock"
  cgroup_driver: "systemd"
  fail_swap_on: false
  server_tls_bootstrap: true
  rotate_certificates: true

kubernetes_api_server_config:
  bind_port: 6443
  secure_port: 6443
  audit_log_maxage: 30
  audit_log_maxbackup: 3
  audit_log_maxsize: 100
  enable_admission_plugins:
    - NodeRestriction
    - ResourceQuota
    - PodSecurityPolicy

kubernetes_systemd_config:
  kubelet:
    enabled: true
    state: started

kubernetes_health_check:
  retries: 30
  delay: 10
  timeout: 300

kubernetes_resource_limits:
  kubelet:
    memory_limit: "1Gi"
    cpu_limit: "500m"
