---
- name: Verify cluster connectivity through load balancer
  ansible.builtin.command: kubectl get --raw='/readyz'
  register: lb_api_health
  until: lb_api_health.rc == 0
  retries: 10
  delay: 5
  changed_when: false
  when: groups['loadbalancers'] is defined and groups['loadbalancers'] | length > 0
  tags:
    - k8s-master
    - verify

- name: Configure kubectl bash completion
  ansible.builtin.lineinfile:
    path: "{{ item.home }}/.bashrc"
    line: "source <(kubectl completion bash)"
    state: present
    create: true
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0644"
  loop: "{{ kubectl.users }}"
  when: kubectl.completion_enabled | bool
  tags:
    - k8s-master
    - kubectl
