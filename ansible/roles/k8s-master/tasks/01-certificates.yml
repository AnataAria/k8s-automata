---
- name: Ensure etcd CA directory exists on master nodes
  ansible.builtin.file:
    path: /etc/kubernetes/pki/etcd
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - k8s-master
    - certificates

- name: Copy etcd CA certificate from etcd nodes to masters
  ansible.builtin.fetch:
    src: "/etc/kubernetes/pki/etcd/ca.crt"
    dest: "/tmp/etcd-ca.crt"
    flat: true
  delegate_to: "{{ groups['etcds'][0] }}"
  run_once: true
  tags:
    - k8s-master
    - certificates

- name: Distribute etcd CA certificate to master nodes
  ansible.builtin.copy:
    src: "/tmp/etcd-ca.crt"
    dest: "/etc/kubernetes/pki/etcd/ca.crt"
    owner: root
    group: root
    mode: "0644"
  tags:
    - k8s-master
    - certificates

- name: Verify etcd certificates exist before kubeadm init
  ansible.builtin.stat:
    path: /etc/kubernetes/pki/etcd/ca.crt
  register: etcd_cert_files
  when:
    - is_first_master
    - kubernetes_initialized is defined
    - not kubernetes_initialized.stat.exists
  tags:
    - k8s-master
    - init
    - certificates

- name: Fail if etcd certificates are missing
  ansible.builtin.fail:
    msg: "Required etcd certificate CA is missing"
  when:
    - is_first_master
    - kubernetes_initialized is defined
    - not kubernetes_initialized.stat.exists
    - etcd_cert_files is defined
    - etcd_cert_files.stat is defined
    - not etcd_cert_files.stat.exists
  tags:
    - k8s-master
    - init
    - certificates
