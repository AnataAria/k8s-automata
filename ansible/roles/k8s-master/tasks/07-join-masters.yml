---
- name: Join additional master nodes to cluster
  when:
    - not is_first_master
    - kubernetes_initialized is defined
    - not kubernetes_initialized.stat.exists
    - ha_config.enabled
  tags:
    - k8s-master
    - join
  block:
    - name: Read master join command
      ansible.builtin.slurp:
        src: "{{ join_tokens.master_token_file }}"
      register: master_join_b64
      delegate_to: localhost
      become: false

    - name: Set join command fact
      ansible.builtin.set_fact:
        join_command: "{{ master_join_b64.content | b64decode | trim }}"

    - name: Join master to cluster
      ansible.builtin.command: "{{ join_command }}"
      args:
        creates: /etc/kubernetes/admin.conf
      register: master_join_result

    - name: Wait for kubelet to be ready
      ansible.builtin.systemd:
        name: kubelet
        state: started
      register: kubelet_status
      until: kubelet_status.status.ActiveState == "active"
      retries: "{{ health_check.retries }}"
      delay: "{{ health_check.delay }}"
