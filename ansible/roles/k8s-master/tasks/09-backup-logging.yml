---
- name: Create Kubernetes log directory
  ansible.builtin.file:
    path: "{{ logging.log_dir }}"
    state: directory
    mode: "0755"
  tags:
    - k8s-master
    - logging

- name: Configure logrotate for Kubernetes logs
  ansible.builtin.template:
    src: kubernetes-logrotate.j2
    dest: /etc/logrotate.d/kubernetes
    mode: "0644"
  tags:
    - k8s-master
    - logging

- name: Create backup directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ backup.config_backup_dir }}"
    - "{{ backup.pki_backup_dir }}"
  when: backup.enabled | bool
  tags:
    - k8s-master
    - backup

- name: Create Kubernetes backup script
  ansible.builtin.template:
    src: k8s-backup.sh.j2
    dest: /usr/local/bin/k8s-backup.sh
    mode: "0755"
  when: backup.enabled | bool
  tags:
    - k8s-master
    - backup

- name: Setup Kubernetes backup cron job
  ansible.builtin.cron:
    name: "kubernetes backup"
    minute: "0"
    hour: "3"
    job: "/usr/local/bin/k8s-backup.sh >> /var/log/k8s-backup.log 2>&1"
    user: root
    state: present
  when: backup.enabled | bool
  tags:
    - k8s-master
    - backup
    - cron
