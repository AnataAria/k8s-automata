---
- name: Start kubelet service (now that dependencies are ready)
  ansible.builtin.systemd:
    name: kubelet
    state: started
    enabled: true
    daemon_reload: true
  tags:
    - k8s-master
    - kubelet

- name: Check if Kubernetes is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubernetes_initialized
  tags:
    - always
    - k8s-master
    - check

- name: Create kubeadm configuration directory
  ansible.builtin.file:
    path: "{{ kubeadm.config_dir }}"
    state: directory
    mode: "0755"
  tags:
    - k8s-master
    - config

- name: Ensure PKI directory exists on master nodes
  ansible.builtin.file:
    path: /etc/kubernetes/pki
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - k8s-master
    - certificates

- name: Set etcd certificate directory and port facts
  ansible.builtin.set_fact:
    etcd_cert_dir: "/etc/kubernetes/pki/etcd"
    etcd_client_port: 2379
  tags:
    - k8s-master
    - etcd
