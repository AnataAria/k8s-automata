---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  tags:
    - handlers
    - systemd

- name: Restart kubelet
  ansible.builtin.systemd:
    name: kubelet
    state: restarted
    daemon_reload: true
  tags:
    - handlers
    - kubelet

- name: Start kubelet
  ansible.builtin.systemd:
    name: kubelet
    state: started
    enabled: true
    daemon_reload: true
  tags:
    - handlers
    - kubelet

- name: Stop kubelet
  ansible.builtin.systemd:
    name: kubelet
    state: stopped
  tags:
    - handlers
    - kubelet

- name: Reload kubelet
  ansible.builtin.systemd:
    name: kubelet
    state: reloaded
  tags:
    - handlers
    - kubelet
