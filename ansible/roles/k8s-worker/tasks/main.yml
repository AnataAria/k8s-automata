---
- name: Start kubelet service (now that dependencies are ready)
  ansible.builtin.systemd:
    name: kubelet
    state: started
    enabled: true
    daemon_reload: true
  tags:
    - k8s-worker
    - kubelet

- name: Check if node is already joined to cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf_exists
  tags:
    - k8s-worker
    - check

- name: Configure firewall for worker node
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ firewall_rules }}"
  when: configure_firewall | default(true) | bool
  tags:
    - k8s-worker
    - firewall

- name: Wait for join command file to be created
  ansible.builtin.wait_for:
    path: "{{ join_token.token_file }}"
    timeout: 600
  delegate_to: localhost
  become: false
  when: not kubelet_conf_exists.stat.exists
  tags:
    - k8s-worker
    - join
    - wait

- name: Read worker join command from file
  ansible.builtin.slurp:
    src: "{{ join_token.token_file }}"
  register: join_command_b64
  delegate_to: localhost
  become: false
  when: not kubelet_conf_exists.stat.exists
  tags:
    - k8s-worker
    - join

- name: Set join command fact
  ansible.builtin.set_fact:
    join_command: "{{ join_command_b64.content | b64decode | trim }}"
  when:
    - not kubelet_conf_exists.stat.exists
    - join_command_b64 is defined
  tags:
    - k8s-worker
    - join

- name: Join worker node to cluster
  ansible.builtin.command:
    cmd: "{{ join_command }}"
  when:
    - not kubelet_conf_exists.stat.exists
    - join_command is defined
  register: worker_join_result
  changed_when: worker_join_result.rc == 0
  tags:
    - k8s-worker
    - join

- name: Wait for kubelet to start
  ansible.builtin.systemd:
    name: kubelet
    state: started
    enabled: true
  register: kubelet_status
  until: kubelet_status.status.ActiveState == "active"
  retries: "{{ health_check.retries }}"
  delay: "{{ health_check.delay }}"
  tags:
    - k8s-worker
    - service

- name: Wait for node to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ health_check.kubelet_healthz_port }}/healthz"
    method: GET
    status_code: 200
  register: kubelet_health
  until: kubelet_health.status == 200
  retries: "{{ health_check.retries }}"
  delay: "{{ health_check.delay }}"
  tags:
    - k8s-worker
    - health

- name: Apply worker node labels (from first master)
  ansible.builtin.command: >
    kubectl label node {{ inventory_hostname }}
    {{ item.key }}={{ item.value }}
    --overwrite
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  loop: "{{ worker_config.labels | dict2items }}"
  delegate_to: "{{ groups['masters'][0] }}"
  when: worker_join_result is succeeded or kubelet_conf_exists.stat.exists
  changed_when: "'{{ item.key }}={{ item.value }}' not in worker_node_labels.stdout"
  register: worker_node_labels
  tags:
    - k8s-worker
    - labels

- name: Apply worker node taints (from first master)
  ansible.builtin.command: >
    kubectl taint node {{ inventory_hostname }}
    {{ item.key }}={{ item.value | default('') }}:{{ item.effect }}
    --overwrite
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  loop: "{{ worker_config.taints }}"
  delegate_to: "{{ groups['masters'][0] }}"
  when:
    - worker_join_result is succeeded or kubelet_conf_exists.stat.exists
    - worker_config.taints | length > 0
  changed_when: "'{{ item.key }}={{ item.value | default('') }}:{{ item.effect }}' not in worker_node_taints.stdout"
  failed_when: false
  register: worker_node_taints
  tags:
    - k8s-worker
    - taints

- name: Create kubelet configuration file
  ansible.builtin.template:
    src: kubelet-config.yaml.j2
    dest: /var/lib/kubelet/config.yaml
    mode: "0644"
    backup: true
  notify: restart kubelet
  tags:
    - k8s-worker
    - config

- name: Configure log rotation for kubelet
  ansible.builtin.template:
    src: kubelet-logrotate.j2
    dest: /etc/logrotate.d/kubelet
    mode: "0644"
  when: log_rotation.enabled | bool
  tags:
    - k8s-worker
    - logging

- name: Create worker node maintenance script
  ansible.builtin.template:
    src: worker-maintenance.sh.j2
    dest: /usr/local/bin/worker-maintenance.sh
    mode: "0755"
  when: maintenance.cleanup_enabled | bool
  tags:
    - k8s-worker
    - maintenance

- name: Setup worker node maintenance cron job
  ansible.builtin.cron:
    name: "worker node maintenance"
    minute: "{{ maintenance.cleanup_schedule.minute | default('*') }}"
    hour: "{{ maintenance.cleanup_schedule.hour | default('*') }}"
    day: "{{ maintenance.cleanup_schedule.day | default('*') }}"
    month: "{{ maintenance.cleanup_schedule.month | default('*') }}"
    weekday: "{{ maintenance.cleanup_schedule.weekday | default('*') }}"
    job: "/usr/local/bin/worker-maintenance.sh >> /var/log/worker-maintenance.log 2>&1"
    user: root
    state: present
  when: maintenance.cleanup_enabled | bool
  tags:
    - k8s-worker
    - maintenance
    - cron

- name: Create worker health check script
  ansible.builtin.template:
    src: worker-health.sh.j2
    dest: /usr/local/bin/worker-health.sh
    mode: "0755"
  when: health_check.enabled | bool
  tags:
    - k8s-worker
    - monitoring

- name: Configure container log rotation
  ansible.builtin.template:
    src: container-logrotate.j2
    dest: /etc/logrotate.d/containers
    mode: "0644"
  when: log_rotation.enabled | bool
  tags:
    - k8s-worker
    - logging

- name: Verify worker node status (from first master)
  ansible.builtin.command: >
    kubectl get node {{ inventory_hostname }}
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: worker_node_status
  until: worker_node_status.stdout == "True"
  retries: "{{ health_check.retries }}"
  delay: "{{ health_check.delay }}"
  delegate_to: "{{ groups['masters'][0] }}"
  when: worker_join_result is succeeded or kubelet_conf_exists.stat.exists
  changed_when: false
  tags:
    - k8s-worker
    - verify
