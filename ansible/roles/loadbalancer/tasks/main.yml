---
- name: Create haproxy directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ loadbalancer_haproxy_config_dir }}"
    - "{{ loadbalancer_haproxy_log_dir }}"
  tags:
    - loadbalancer

- name: Install HAProxy and required packages
  ansible.builtin.apt:
    name:
      - haproxy
      - socat
    state: present
    update_cache: true
  tags:
    - loadbalancer

- name: Stop default HAProxy service
  ansible.builtin.systemd:
    name: haproxy
    state: stopped
    enabled: false
  failed_when: false
  tags:
    - loadbalancer

- name: Generate HAProxy configuration
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: "{{ loadbalancer_haproxy_config_dir }}/haproxy.cfg"
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: restart haproxy
  tags:
    - loadbalancer

- name: Validate HAProxy configuration
  ansible.builtin.command: haproxy -c -f "{{ loadbalancer_haproxy_config_dir }}/haproxy.cfg"
  register: loadbalancer_haproxy_config_check
  changed_when: false
  tags:
    - loadbalancer

- name: Configure firewall for HAProxy ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop:
    - port: "{{ loadbalancer_haproxy_ports.api_port }}"
      proto: "tcp"
      comment: "Kubernetes API Server"
    - port: "{{ loadbalancer_haproxy_ports.http_port }}"
      proto: "tcp"
      comment: "HTTP Ingress"
    - port: "{{ loadbalancer_haproxy_ports.https_port }}"
      proto: "tcp"
      comment: "HTTPS Ingress"
    - port: "{{ loadbalancer_haproxy_ports.stats_port }}"
      proto: "tcp"
      comment: "HAProxy Stats"
  when: loadbalancer_configure_firewall | default(true) | bool
  tags:
    - loadbalancer

- name: Enable and start HAProxy service
  ansible.builtin.systemd:
    name: haproxy
    enabled: true
    state: started
    daemon_reload: true
  tags:
    - loadbalancer

- name: Wait for HAProxy to be ready
  ansible.builtin.wait_for:
    port: "{{ loadbalancer_haproxy_ports.api_port }}"
    delay: 5
    timeout: 30
  tags:
    - loadbalancer
