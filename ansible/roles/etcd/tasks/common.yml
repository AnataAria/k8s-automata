---
- name: Derive etcd peer topology
  ansible.builtin.set_fact:
    etcd_name: "{{ inventory_hostname }}"
    etcd_ip: "{{ etcd_ip | default(ip | default(access_ip | default(ansible_host))) }}"
    etcd_peers: []

- name: Assert etcd IP is resolvable from inventory
  ansible.builtin.assert:
    that:
      - etcd_ip is defined
      - etcd_ip | length > 0
    fail_msg: "Unable to derive etcd_ip from etcd_ip, ip, access_ip, or ansible_host for {{ inventory_hostname }}."

- name: Build normalized etcd peer list
  ansible.builtin.set_fact:
    etcd_peers: >-
      {{
        etcd_peers + [
          {
            'name': item,
            'ip': hostvars[item].ip
                    | default(hostvars[item].access_ip | default(hostvars[item].ansible_host))
          }
        ]
      }}
  loop: "{{ groups['etcd'] }}"

- name: Create etcd system group
  ansible.builtin.group:
    name: etcd
    system: true
    state: present

- name: Create etcd system user
  ansible.builtin.user:
    name: etcd
    group: etcd
    system: true
    shell: /usr/sbin/nologin
    home: "{{ etcd_data_dir }}"
    create_home: false
    state: present

- name: Create etcd directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: '{{ etcd_data_dir }}', owner: 'etcd', group: 'etcd', mode: '0700' }
    - { path: '{{ etcd_cert_dir }}', owner: 'etcd', group: 'etcd', mode: '0700' }
    - { path: '{{ etcd_config_dir }}', owner: 'root', group: 'root', mode: '0755' }
