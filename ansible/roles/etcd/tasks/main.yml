---
- name: Derive etcd peer topology
  ansible.builtin.set_fact:
    etcd_name: "{{ inventory_hostname }}"
    etcd_ip: "{{ ip | default(access_ip | default(ansible_host)) }}"
    etcd_peers: []

- name: Build normalized etcd peer list
  ansible.builtin.set_fact:
    etcd_peers: >-
      {{
        etcd_peers + [
          {
            'name': item,
            'ip': hostvars[item].ip
                    | default(hostvars[item].access_ip | default(hostvars[item].ansible_host))
          }
        ]
      }}
  loop: "{{ groups['etcd'] }}"

- name: Create etcd system group
  ansible.builtin.group:
    name: etcd
    system: true
    state: present

- name: Create etcd system user
  ansible.builtin.user:
    name: etcd
    group: etcd
    system: true
    shell: /usr/sbin/nologin
    home: "{{ etcd_data_dir }}"
    create_home: false
    state: present

- name: Create etcd directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: '{{ etcd_data_dir }}', owner: 'etcd', group: 'etcd', mode: '0700' }
    - { path: '{{ etcd_cert_dir }}', owner: 'etcd', group: 'etcd', mode: '0700' }
    - { path: '{{ etcd_config_dir }}', owner: 'root', group: 'root', mode: '0755' }

- name: Install etcd binaries
  ansible.builtin.import_tasks: install.yml

- name: Configure etcd
  ansible.builtin.import_tasks: configure.yml

- name: Start etcd service
  ansible.builtin.import_tasks: service.yml

- name: Verify etcd cluster health
  ansible.builtin.import_tasks: verify.yml
