---
- name: Create etcd backup script
  ansible.builtin.template:
    src: etcd-backup.sh.j2
    dest: /usr/local/bin/etcd-backup.sh
    mode: "0755"
  when: etcd_backup.enabled | bool
  tags:
    - etcd
    - backup

- name: Create etcd restore script
  ansible.builtin.template:
    src: etcd-restore.sh.j2
    dest: /usr/local/bin/etcd-restore.sh
    mode: "0755"
  tags:
    - etcd
    - restore

- name: Create etcd defrag script
  ansible.builtin.template:
    src: etcd-defrag.sh.j2
    dest: /usr/local/bin/etcd-defrag.sh
    mode: "0755"
  when: etcd_maintenance.defrag_enabled | bool
  tags:
    - etcd
    - maintenance

- name: Create etcd health check script
  ansible.builtin.template:
    src: etcd-health.sh.j2
    dest: /usr/local/bin/etcd-health.sh
    mode: "0755"
  when: etcd_monitoring.health_check_enabled | bool
  tags:
    - etcd
    - monitoring

- name: Setup etcd backup cron job
  ansible.builtin.cron:
    name: "etcd backup"
    minute: "0"
    hour: "2"
    day: "*"
    month: "*"
    weekday: "*"
    job: "/usr/local/bin/etcd-backup.sh >> /var/log/etcd-backup.log 2>&1"
    user: root
    state: present
  when: etcd_backup.enabled | bool
  tags:
    - etcd
    - backup
    - cron

- name: Setup etcd defragmentation cron job
  ansible.builtin.cron:
    name: "etcd defragmentation"
    minute: "0"
    hour: "3"
    day: "*"
    month: "*"
    weekday: "0"
    job: "/usr/local/bin/etcd-defrag.sh >> /var/log/etcd-maintenance.log 2>&1"
    user: root
    state: present
  when: etcd_maintenance.defrag_enabled | bool
  tags:
    - etcd
    - maintenance
    - cron
