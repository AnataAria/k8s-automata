---
- name: Check etcd CA already exists
  ansible.builtin.stat:
    path: "{{ kubeadm_cert_dir }}/etcd/ca.crt"
  register: etcd_ca_exists
  when: inventory_hostname == groups['etcd'][0]

- name: Create per-node kubeadm config for cert generation
  ansible.builtin.template:
    src: etcd-kubeadm-config.yaml.j2
    dest: "/tmp/etcd-kubeadm-config-{{ item.name }}.yaml"
    mode: "0600"
  loop: "{{ etcd_peers }}"
  when:
    - inventory_hostname == groups['etcd'][0]
    - not etcd_ca_exists.stat.exists

- name: Generate etcd CA
  ansible.builtin.command: kubeadm init phase certs etcd-ca
  args:
    creates: "{{ kubeadm_cert_dir }}/etcd/ca.crt"
  when: inventory_hostname == groups['etcd'][0]

- name: Generate etcd-server certs for each peer
  ansible.builtin.command: >
    kubeadm init phase certs etcd-server
    --config=/tmp/etcd-kubeadm-config-{{ item.name }}.yaml
  args:
    creates: "{{ kubeadm_cert_dir }}/etcd/{{ item.name }}-server.crt"
  loop: "{{ etcd_peers }}"
  when:
    - inventory_hostname == groups['etcd'][0]
    - not etcd_ca_exists.stat.exists

- name: Generate etcd-peer certs for each peer
  ansible.builtin.command: >
    kubeadm init phase certs etcd-peer
    --config=/tmp/etcd-kubeadm-config-{{ item.name }}.yaml
  args:
    creates: "{{ kubeadm_cert_dir }}/etcd/{{ item.name }}-peer.crt"
  loop: "{{ etcd_peers }}"
  when:
    - inventory_hostname == groups['etcd'][0]
    - not etcd_ca_exists.stat.exists

- name: Generate etcd-healthcheck-client cert
  ansible.builtin.command: >
    kubeadm init phase certs etcd-healthcheck-client
    --config=/tmp/etcd-kubeadm-config-{{ etcd_peers[0].name }}.yaml
  args:
    creates: "{{ kubeadm_cert_dir }}/etcd/healthcheck-client.crt"
  when: inventory_hostname == groups['etcd'][0]

- name: Generate apiserver-etcd-client cert
  ansible.builtin.command: >
    kubeadm init phase certs apiserver-etcd-client
    --config=/tmp/etcd-kubeadm-config-{{ etcd_peers[0].name }}.yaml
  args:
    creates: "{{ kubeadm_cert_dir }}/apiserver-etcd-client.crt"
  when: inventory_hostname == groups['etcd'][0]

- name: Create cert bundle staging dir
  ansible.builtin.file:
    path: /tmp/etcd-cert-bundles
    state: directory
    mode: "0700"
  when: inventory_hostname == groups['etcd'][0]

- name: Package cert bundle per etcd node
  archive:
    path:
      - "{{ kubeadm_cert_dir }}/etcd/ca.crt"
      - "{{ kubeadm_cert_dir }}/etcd/ca.key"
      - "{{ kubeadm_cert_dir }}/etcd/{{ item.name }}-server.crt"
      - "{{ kubeadm_cert_dir }}/etcd/{{ item.name }}-server.key"
      - "{{ kubeadm_cert_dir }}/etcd/{{ item.name }}-peer.crt"
      - "{{ kubeadm_cert_dir }}/etcd/{{ item.name }}-peer.key"
      - "{{ kubeadm_cert_dir }}/etcd/healthcheck-client.crt"
      - "{{ kubeadm_cert_dir }}/etcd/healthcheck-client.key"
    dest: "/tmp/etcd-cert-bundles/{{ item.name }}.tar.gz"
    mode: "0600"
  loop: "{{ etcd_peers }}"
  when: inventory_hostname == groups['etcd'][0]

- name: Package apiserver-etcd-client bundle
  archive:
    path:
      - "{{ kubeadm_cert_dir }}/etcd/ca.crt"
      - "{{ kubeadm_cert_dir }}/apiserver-etcd-client.crt"
      - "{{ kubeadm_cert_dir }}/apiserver-etcd-client.key"
    dest: /tmp/etcd-cert-bundles/apiserver-etcd-client.tar.gz
    mode: "0600"
  when: inventory_hostname == groups['etcd'][0]

- name: Fetch etcd cert bundles về controller
  ansible.builtin.fetch:
    src: "/tmp/etcd-cert-bundles/{{ item.name }}.tar.gz"
    dest: "/tmp/etcd-cert-bundles/{{ item.name }}.tar.gz"
    flat: true
  loop: "{{ etcd_peers }}"
  when: inventory_hostname == groups['etcd'][0]

- name: Fetch apiserver-etcd-client bundle về controller
  ansible.builtin.fetch:
    src: /tmp/etcd-cert-bundles/apiserver-etcd-client.tar.gz
    dest: /tmp/etcd-cert-bundles/apiserver-etcd-client.tar.gz
    flat: true
  when: inventory_hostname == groups['etcd'][0]

- name: Normalize cert filenames on etcd-1
  ansible.builtin.copy:
    src: "{{ kubeadm_cert_dir }}/etcd/{{ item.src }}"
    dest: "{{ etcd_cert_dir }}/{{ item.dest }}"
    owner: etcd
    group: etcd
    mode: "0600"
    remote_src: true
  loop:
    - { src: "ca.crt", dest: "ca.crt" }
    - { src: "ca.key", dest: "ca.key" }
    - { src: "{{ etcd_name }}-server.crt", dest: "server.crt" }
    - { src: "{{ etcd_name }}-server.key", dest: "server.key" }
    - { src: "{{ etcd_name }}-peer.crt", dest: "peer.crt" }
    - { src: "{{ etcd_name }}-peer.key", dest: "peer.key" }
    - { src: "healthcheck-client.crt", dest: "healthcheck-client.crt" }
    - { src: "healthcheck-client.key", dest: "healthcheck-client.key" }
  when: inventory_hostname == groups['etcd'][0]

# ---- Distribute tới etcd-2 và etcd-3 ----

- name: Check cert already present on node
  ansible.builtin.stat:
    path: "{{ etcd_cert_dir }}/ca.crt"
  register: etcd_cert_on_node
  when: inventory_hostname != groups['etcd'][0]

- name: Upload cert bundle từ controller lên node
  ansible.builtin.copy:
    src: "/tmp/etcd-cert-bundles/{{ etcd_name }}.tar.gz"
    dest: /tmp/etcd-cert-bundle.tar.gz
    mode: "0600"
  when:
    - inventory_hostname != groups['etcd'][0]
    - not etcd_cert_on_node.stat.exists

- name: Extract cert bundle vào etcd_cert_dir
  ansible.builtin.unarchive:
    src: /tmp/etcd-cert-bundle.tar.gz
    dest: "{{ etcd_cert_dir }}"
    remote_src: true
    extra_opts:
      - "--strip-components=5"
    owner: etcd
    group: etcd
  when:
    - inventory_hostname != groups['etcd'][0]
    - not etcd_cert_on_node.stat.exists

- name: Rename peer certs to standard names
  ansible.builtin.copy:
    src: "{{ etcd_cert_dir }}/{{ item.src }}"
    dest: "{{ etcd_cert_dir }}/{{ item.dest }}"
    owner: etcd
    group: etcd
    mode: "0600"
    remote_src: true
  loop:
    - { src: "{{ etcd_name }}-server.crt", dest: "server.crt" }
    - { src: "{{ etcd_name }}-server.key", dest: "server.key" }
    - { src: "{{ etcd_name }}-peer.crt", dest: "peer.crt" }
    - { src: "{{ etcd_name }}-peer.key", dest: "peer.key" }
  when:
    - inventory_hostname != groups['etcd'][0]
    - not etcd_cert_on_node.stat.exists

# ---- Cleanup ----

- name: Clean up tmp cert files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/etcd-cert-bundle.tar.gz
    - /tmp/etcd-cert-bundles
