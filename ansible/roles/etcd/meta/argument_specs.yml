---
argument_specs:
  main:
    short_description: "Install and config etcd cluster"
    options:
      etcd_version:
        type: str
        required: true
        description: "etcd version to install"
      etcd_name:
        type: str
        required: false
        default: "{{ inventory_hostname }}"
        description: "etcd node name"
      etcd_ip:
        type: str
        required: false
        default: "{{ ip | default(access_ip | default(ansible_host)) }}"
        description: "etcd ip"
      etcd_data_dir:
        type: path
        required: false
        description: "etcd data dir"
      etcd_home_dir:
        type: path
        required: false
        description: "etcd home dir"
        default: "/home/etcd"
      etcd_cert_dir:
        type: path
        required: false
        description: "etcd cert dir"
        default: "/etc/etcd/pki"
      etcd_config_dir:
        type: path
        required: false
        description: "etcd config dir"
        default: "/etc/etcd"
      etcd_download_dir:
        type: path
        required: false
        description: "etcd download dir"
        default: "/tmp"
      etcd_client_port:
        type: int
        required: false
        default: 2379
        description: "etcd client port"
      etcd_peer_port:
        type: int
        required: false
        default: 2380
        description: "etcd peer port"
      etcd_cluster_token:
        type: str
        required: false
        default: "etcd-cluster-k8s"
        description: "etcd cluster token"
      etcd_initial_cluster_state:
        type: str
        required: false
        default: "new"
        description: "etcd init cluster of scale mode"
        choices:
          - "new"
          - "scale"
