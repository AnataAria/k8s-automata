---
cilium_version: "1.16.1"
cilium_cli_version: "0.15.22"

cilium_install_method: "helm"
cilium_namespace: "kube-system"

cilium_helm:
  chart_name: "cilium"
  chart_version: "{{ cilium_version }}"
  repo_name: "cilium"
  repo_url: "https://helm.cilium.io/"
  release_name: "cilium"
  wait: true
  timeout: "10m"

cilium_cli:
  download_url: "https://github.com/cilium/cilium-cli/releases/download/v{{ cilium_cli_version }}/cilium-linux-amd64.tar.gz"
  install_path: "/usr/local/bin/cilium"

cluster_config:
  name: "kubernetes"
  pod_cidr: "10.244.0.0/16"
  service_cidr: "10.96.0.0/12"

cilium_config:
  ipam:
    mode: "kubernetes"
    operator:
      cluster_pool_ipv4_pod_cidr: "{{ cluster_config.pod_cidr }}"
      cluster_pool_ipv4_mask_size: 24
  datapath:
    mode: "vxlan"
    tunnel_protocol: "vxlan"
  container_runtime:
    integration: "containerd"
    socket_path: "/run/containerd/containerd.sock"
  k8s_require_ipv4_pod_cidr: true
  k8s_require_ipv6_pod_cidr: false
  enable_ipv4: true
  enable_ipv6: false
  cluster_id: 1
  cluster_name: "{{ cluster_config.name }}"

security:
  enable_l7_proxy: true
  enable_l4_load_balancer: true
  enable_local_redirect_policy: true
  enable_identity_mark: true
  enable_wireguard: false
  enable_ipsec: false
  enable_hubble: true
  enable_hubble_relay: true
  enable_hubble_ui: true

performance:
  enable_bpf_masquerade: true
  enable_ip_masq_agent: false
  enable_bandwidth_manager: true
  enable_local_node_route: false
  operator_replicas: 1
  resources:
    limits:
      cpu: "1000m"
      memory: "1Gi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  tunnel_port: 8472
  monitor_aggregation: "medium"
  preallocate_bpf_maps: false

load_balancing:
  lb_mode: "snat"
  lb_algorithm: "maglev"
  enable_envoy_config: false
  enable_ingress_controller: false

monitoring:
  enabled: true
  enable_metrics: true
  metrics_port: 9090
  operator_metrics_port: 6942
  prometheus:
    enabled: true
    port: 9090
    service_monitor: false
  enable_health_check_nodeport: false
  enable_endpoint_health_checking: true

hubble:
  enabled: "{{ security.enable_hubble }}"
  relay:
    enabled: "{{ security.enable_hubble_relay }}"
    replicas: 1
    resources:
      limits:
        cpu: "1000m"
        memory: "1024Mi"
      requests:
        cpu: "100m"
        memory: "64Mi"
  ui:
    enabled: "{{ security.enable_hubble_ui }}"
    replicas: 1
    ingress:
      enabled: false
      hostname: "hubble.local"
  export:
    file:
      enabled: false
    kafka:
      enabled: false

node:
  node_selector: {}
  tolerations: []
  update_strategy: "RollingUpdate"
  mount_propagation: "HostToContainer"

operator:
  enabled: true
  replicas: "{{ performance.operator_replicas }}"
  resources: "{{ performance.resources }}"
  node_selector: {}
  tolerations:
    - operator: "Exists"

cni:
  binaries_dir: "/opt/cni/bin"
  conf_dir: "/etc/cni/net.d"
  conf_file_mount_path: "/tmp/cni-configuration"
  hostroot: "/host"

upgrade:
  max_unavailable: 1
  preflight:
    enabled: true
    timeout: "5m"

network_policy:
  enabled: true
  default_policy: "default-allow"

firewall_rules:
  - port: 8472
    proto: "udp"
    comment: "Cilium VXLAN"
  - port: 8473
    proto: "tcp"
    comment: "Cilium health checks"
  - port: 4244
    proto: "tcp"
    comment: "Hubble server"
  - port: 4245
    proto: "tcp"
    comment: "Hubble relay"

backup:
  enabled: false
  schedule: "0 2 * * *"
  retention_days: 7

integrations:
  aws:
    enabled: false
  azure:
    enabled: false
  gcp:
    enabled: false

feature_gates:
  enable_k8s_terminating_endpoint: true
  enable_vtep: false
  enable_bgp_control_plane: false
