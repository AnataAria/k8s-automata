---
- name: Remove old Docker packages and broken containerd.io
  ansible.builtin.apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - runc
    state: absent
    purge: true
    autoremove: true
  tags:
    - containerd
    - cleanup

- name: Remove Docker repositories and keys
  tags:
    - containerd
    - cleanup
  block:
    - name: Remove Docker GPG key
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/share/keyrings/docker-archive-keyring.gpg
        - /etc/apt/keyrings/docker.gpg
        - /etc/apt/keyrings/docker.asc
        - /usr/share/keyrings/docker.gpg

    - name: Remove Docker repository files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/docker.list
        - /etc/apt/sources.list.d/docker-ce.list

    - name: Update apt cache after cleanup
      ansible.builtin.apt:
        update_cache: true

- name: Create containerd directories
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"
  tags:
    - containerd
    - directories

- name: Install containerd from Debian repositories
  ansible.builtin.apt:
    name: containerd
    state: present
    update_cache: true
  tags:
    - containerd
    - install

- name: Install runc from Debian repositories
  ansible.builtin.apt:
    name: runc
    state: present
  tags:
    - runc
    - install

- name: Reload systemd daemon after package installation
  ansible.builtin.systemd:
    daemon_reload: true
  tags:
    - containerd
    - install

- name: Generate default containerd configuration
  ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml
  tags:
    - containerd
    - config

- name: Configure systemd cgroup driver for containerd
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '(\s+)SystemdCgroup = false'
    line: '\1SystemdCgroup = true'
    backrefs: true
  notify: restart containerd
  tags:
    - containerd
    - config

- name: Enable and start containerd service
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: started
    daemon_reload: true
  tags:
    - containerd
    - service

- name: Wait for containerd socket
  ansible.builtin.wait_for:
    path: /run/containerd/containerd.sock
    timeout: 120
  tags:
    - containerd
    - verify
