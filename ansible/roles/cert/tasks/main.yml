---
- name: Derive certificate topology inputs
  ansible.builtin.set_fact:
    cert_etcd_hosts: "{{ groups['etcd'] }}"
    cert_control_plane_hosts: "{{ groups['control_plane'] }}"
    cert_generation_host: "{{ cert_generation_delegate | default(groups['etcd'][0]) }}"
    cert_etcd_kubeadm_config_path: "{{ kubeadm_artifact_dir }}/etcd-cert-kubeadm-config.yaml"
    cert_control_plane_kubeadm_config_path: "{{ kubeadm_artifact_dir }}/etcd-cert-kubeadm-config.yaml"

- name: Assert certificate topology prerequisites
  ansible.builtin.assert:
    that:
      - cert_etcd_hosts | length > 0
      - cert_control_plane_hosts | length > 0
      - cert_generation_host in cert_etcd_hosts
    fail_msg: >-
      The cert role requires populated etcd and control_plane groups, and the
      certificate generation host must be a member of the etcd group.
  run_once: true

- name: Ensure local PKI artifact directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  run_once: true
  loop:
    - "{{ cert_local_artifact_dir }}"
    - "{{ cert_control_plane_artifact_dir }}"

- name: Ensure kubeadm PKI directories exist on certificate generation host
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  delegate_to: "{{ cert_generation_host }}"
  run_once: true
  loop:
    - "{{ cert_kubeadm_cert_dir }}"
    - "{{ cert_kubeadm_cert_dir }}/etcd"

- name: Generate etcd CA on certificate generation host
  ansible.builtin.command:
    argv:
      - kubeadm
      - init
      - phase
      - certs
      - etcd-ca
  args:
    creates: "{{ cert_kubeadm_cert_dir }}/etcd/ca.crt"
  delegate_to: "{{ cert_generation_host }}"
  run_once: true

- name: Generate kube-apiserver to etcd client certificate on certificate generation host
  ansible.builtin.command:
    argv:
      - kubeadm
      - init
      - phase
      - certs
      - apiserver-etcd-client
  args:
    creates: "{{ cert_kubeadm_cert_dir }}/apiserver-etcd-client.crt"
  delegate_to: "{{ cert_generation_host }}"
  run_once: true

- name: Fetch shared etcd CA material to controller artifacts
  ansible.builtin.fetch:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    flat: true
  delegate_to: "{{ cert_generation_host }}"
  run_once: true
  loop:
    - src: "{{ cert_kubeadm_cert_dir }}/etcd/ca.crt"
      dest: "{{ cert_local_artifact_dir }}/ca.crt"
    - src: "{{ cert_kubeadm_cert_dir }}/etcd/ca.key"
      dest: "{{ cert_local_artifact_dir }}/ca.key"

- name: Fetch apiserver-etcd-client material to controller artifacts
  ansible.builtin.fetch:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    flat: true
  delegate_to: "{{ cert_generation_host }}"
  run_once: true
  loop:
    - src: "{{ cert_kubeadm_cert_dir }}/apiserver-etcd-client.crt"
      dest: "{{ cert_control_plane_artifact_dir }}/apiserver-etcd-client.crt"
    - src: "{{ cert_kubeadm_cert_dir }}/apiserver-etcd-client.key"
      dest: "{{ cert_control_plane_artifact_dir }}/apiserver-etcd-client.key"

- name: Ensure etcd system group exists before staging certificates
  ansible.builtin.group:
    name: etcd
    system: true
    state: present
  when: inventory_hostname in cert_etcd_hosts

- name: Ensure etcd system user exists before staging certificates
  ansible.builtin.user:
    name: etcd
    group: etcd
    system: true
    shell: /usr/sbin/nologin
    home: "{{ cert_etcd_data_dir }}"
    create_home: true
    state: present
  when: inventory_hostname in cert_etcd_hosts

- name: Ensure kubeadm PKI workspace exists on etcd nodes
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  when: inventory_hostname in cert_etcd_hosts
  loop:
    - "{{ kubeadm_artifact_dir }}"
    - "{{ cert_kubeadm_cert_dir }}"
    - "{{ cert_kubeadm_cert_dir }}/etcd"

- name: Ensure etcd certificate directory exists on etcd nodes
  ansible.builtin.file:
    path: "{{ cert_etcd_cert_dir }}"
    state: directory
    owner: etcd
    group: etcd
    mode: "0700"
  when: inventory_hostname in cert_etcd_hosts

- name: Copy shared etcd CA material to etcd kubeadm PKI workspace
  ansible.builtin.copy:
    src: "{{ cert_local_artifact_dir }}/ca.{{ item }}"
    dest: "{{ cert_kubeadm_cert_dir }}/etcd/ca.{{ item }}"
    mode: "{{ '0600' if item == 'key' else '0644' }}"
  when: inventory_hostname in cert_etcd_hosts
  loop:
    - crt
    - key

- name: Copy shared CA material to control plane kubeadm PKI workspace
  ansible.builtin.copy:
    src: "{{ cert_local_artifact_dir }}/ca.{{ item }}"
    dest: "{{ cert_kubeadm_cert_dir }}/etcd/ca.{{ item }}"
    mode: "{{ '0600' if item == 'key' else '0644' }}"
  when: inventory_hostname in cert_control_plane_hosts
  loop:
    - crt
    - key

- name: Render kubeadm certificate configuration for etcd nodes
  ansible.builtin.template:
    src: cert-kubeadm-config.yaml.j2
    dest: "{{ cert_etcd_kubeadm_config_path }}"
    mode: "0600"
  when: inventory_hostname in cert_etcd_hosts
  vars:
    cert_target_addresses: >-
      {{
        [
          inventory_hostname,
          ansible_host,
          (ip | default(access_ip | default(ansible_host))),
          'localhost',
          '127.0.0.1'
        ] | unique
      }}

- name: Render kubeadm certificate configuration for control plane nodes
  ansible.builtin.template:
    src: cert-kubeadm-config.yaml.j2
    dest: "{{ cert_control_plane_kubeadm_config_path }}"
    mode: "0600"
  when: inventory_hostname in cert_control_plane_hosts
  vars:
    cert_target_addresses: >-
      {{
        [
          inventory_hostname,
          ansible_host,
          (ip | default(access_ip | default(ansible_host))),
          'localhost',
          '127.0.0.1'
        ] | unique
      }}

- name: Generate etcd server certificate on each etcd node
  ansible.builtin.command:
    argv:
      - kubeadm
      - init
      - phase
      - certs
      - etcd-server
      - --config
      - "{{ cert_etcd_kubeadm_config_path }}"
  args:
    creates: "{{ cert_kubeadm_cert_dir }}/etcd/server.crt"
  when: inventory_hostname in cert_etcd_hosts

- name: Generate etcd peer certificate on each etcd node
  ansible.builtin.command:
    argv:
      - kubeadm
      - init
      - phase
      - certs
      - etcd-peer
      - --config
      - "{{ cert_etcd_kubeadm_config_path }}"
  args:
    creates: "{{ cert_kubeadm_cert_dir }}/etcd/peer.crt"
  when: inventory_hostname in cert_etcd_hosts

- name: Generate etcd healthcheck client certificate on each etcd node
  ansible.builtin.command:
    argv:
      - kubeadm
      - init
      - phase
      - certs
      - etcd-healthcheck-client
      - --config
      - "{{ cert_etcd_kubeadm_config_path }}"
  args:
    creates: "{{ cert_kubeadm_cert_dir }}/etcd/healthcheck-client.crt"
  when: inventory_hostname in cert_etcd_hosts

- name: Copy kubeadm-generated etcd runtime certificates into etcd service PKI directory
  ansible.builtin.copy:
    src: "{{ cert_kubeadm_cert_dir }}/etcd/{{ item }}"
    dest: "{{ cert_etcd_cert_dir }}/{{ item }}"
    remote_src: true
    owner: etcd
    group: etcd
    mode: "{{ '0600' if item.endswith('.key') else '0644' }}"
  when: inventory_hostname in cert_etcd_hosts
  loop:
    - ca.crt
    - server.crt
    - server.key
    - peer.crt
    - peer.key
    - healthcheck-client.crt
    - healthcheck-client.key

- name: Ensure Kubernetes PKI directories exist on control-plane nodes
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  when: inventory_hostname in cert_control_plane_hosts
  loop:
    - "{{ cert_kubeadm_cert_dir }}"
    - "{{ cert_kubeadm_cert_dir }}/etcd"

- name: Generate etcd healthcheck client certificate on each etcd node
  ansible.builtin.command:
    argv:
      - kubeadm
      - init
      - phase
      - certs
      - apiserver-etcd-client
      - --config
      - "{{ cert_control_plane_kubeadm_config_path }}"
  args:
    creates: "{{ cert_kubeadm_cert_dir }}/apiserver-etcd-client.crt"
  when: inventory_hostname in cert_control_plane_hosts
