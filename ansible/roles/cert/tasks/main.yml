---
- name: Check etcd CA already exists
  ansible.builtin.stat:
    path: "{{ kubeadm_cert_dir }}/etcd/ca.crt"
  register: cert_ca_exists
  when: inventory_hostname == groups['etcd'][0]

- name: Create per-node kubeadm config for cert generation
  ansible.builtin.template:
    src: cert-kubeadm-config.yaml.j2
    dest: "/tmp/etcd-kubeadm-config-{{ item.name }}.yaml"
    mode: "0600"
  loop: "{{ etcd_peers }}"
  when:
    - inventory_hostname == groups['etcd'][0]
    - not cert_ca_exists.stat.exists

- name: Generate etcd CA
  ansible.builtin.command: kubeadm init phase certs etcd-ca
  args:
    creates: "{{ kubeadm_cert_dir }}/etcd/ca.crt"
  when: inventory_hostname == groups['etcd'][0]

- name: Fetch etcd CA về controller
  ansible.builtin.fetch:
    src: "{{ kubeadm_cert_dir }}/etcd/{{ item }}"
    dest: "/tmp/etcd-ca/{{ item }}"
    flat: true
  loop:
    - ca.crt
    - ca.key
  when: inventory_hostname == groups['etcd'][0]

- name: Copy etcd CA lên all etcd nodes
  ansible.builtin.copy:
    src: "/tmp/etcd-ca/{{ item }}"
    dest: "{{ kubeadm_cert_dir }}/etcd/{{ item }}"
    mode: "0600"
  loop:
    - ca.crt
    - ca.key

- name: Gen etcd-server cert
  ansible.builtin.command: >
    kubeadm init phase certs etcd-server
    --config=/tmp/etcd-kubeadm-config.yaml
  args:
    creates: "{{ kubeadm_cert_dir }}/etcd/server.crt"

- name: Gen etcd-peer cert
  ansible.builtin.command: >
    kubeadm init phase certs etcd-peer
    --config=/tmp/etcd-kubeadm-config.yaml
  args:
    creates: "{{ kubeadm_cert_dir }}/etcd/peer.crt"

- name: Gen etcd-healthcheck-client cert
  ansible.builtin.command: >
    kubeadm init phase certs etcd-healthcheck-client
    --config=/tmp/etcd-kubeadm-config.yaml
  args:
    creates: "{{ kubeadm_cert_dir }}/etcd/healthcheck-client.crt"
